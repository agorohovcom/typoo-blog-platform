spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=gateway-server
spring.config.import=optional:configserver:http://localhost:8888/
# DotenvLoader
dotenv.enabled=true
dotenv.base-path=services/{service}
dotenv.filename=.env.{profile}
dotenv.secrets-path=/run/secrets
dotenv.override-existing=false