spring.config.import=optional:configserver:http://config-server:8888
spring.datasource.url=${TYPOO_ARTICLE_DB_URL}
spring.datasource.username=${TYPOO_ARTICLE_DB_USERNAME}
spring.datasource.password=${TYPOO_ARTICLE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${TYPOO_ARTICLE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${TYPOO_ARTICLE_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${TYPOO_ARTICLE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.use_sql_comments=${TYPOO_ARTICLE_USE_SQL_COMMENTS:true}
spring.liquibase.change-log=classpath:db/liquibase/changelog-master.yml
spring.liquibase.enabled=${TYPOO_ARTICLE_LIQUIBASE_ENABLED:false}
