server.port=${TYPOO_ARTICLE_PORT:8081}
#
spring.datasource.url=${TYPOO_ARTICLE_DB_URL}
spring.datasource.username=${TYPOO_ARTICLE_DB_USERNAME}
spring.datasource.password=${TYPOO_ARTICLE_DB_PASSWORD}
#
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#
spring.liquibase.change-log=classpath:db/liquibase/changelog-master.yml
spring.liquibase.enabled=true
#
logging.level.org.springframework=INFO
logging.level.com.agorohov=DEBUG