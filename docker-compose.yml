services:
  article-db:
    image: postgres:17
    container_name: article-db
    env_file:
      - .env
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${TYPOO_ARTICLE_DB_NAME}
      POSTGRES_USER: ${TYPOO_ARTICLE_DB_USERNAME}
      POSTGRES_PASSWORD: ${TYPOO_ARTICLE_DB_PASSWORD}
    command: [ "postgres", "-c", "max_connections=1000" ]
    volumes:
      - typoo_article_db_data:/var/lib/postgresql/data
    networks:
      - typoo_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TYPOO_ARTICLE_DB_USERNAME} -d ${TYPOO_ARTICLE_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consul:
    image: consul:1.15.4
    ports:
      - "8500:8500"
    networks:
      - typoo_network
    command: "consul agent -dev -client=0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    networks:
      - typoo_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - typoo_grafana_data:/var/lib/grafana
    networks:
      - typoo_network
    restart: unless-stopped

  config-server:
    container_name: config-server
    build:
      context: .
      dockerfile: ./services/config-server/Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ./services/config-server/config:/services/config-server/config
    secrets:
      - config-server_env_file
    depends_on:
      - consul
    networks:
      - typoo_network
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway-server:
    container_name: gateway-server
    build:
      context: .
      dockerfile: ./services/gateway-server/Dockerfile
    ports:
      - "8080:8080"
    secrets:
      - gateway-server_env_file
    depends_on:
      consul:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - typoo_network
    restart: unless-stopped

  article-service:
    container_name: article-service
    build:
      context: .
      dockerfile: ./services/article-service/Dockerfile
    secrets:
      - article-service_env_file
    ports:
      - "8081:8081"
    depends_on:
      article-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      gateway-server:
        condition: service_started
      consul:
        condition: service_healthy
    networks:
      - typoo_network
    restart: unless-stopped

secrets:
  config-server_env_file:
    file: ./services/config-server/.env.${SPRING_PROFILES_ACTIVE:-docker}
  gateway-server_env_file:
    file: ./services/gateway-server/.env.${SPRING_PROFILES_ACTIVE:-docker}
  article-service_env_file:
    file: ./services/article-service/.env.${SPRING_PROFILES_ACTIVE:-docker}

volumes:
  typoo_grafana_data:
  typoo_article_db_data:

networks:
  typoo_network:
    driver: bridge